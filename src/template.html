<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: Arial, Helvetica, sans-serif;
  }

  #container {
    width: 1080px;
    height: 1080px;
    background: radial-gradient(ellipse 90% 70% at 30% 20%, #FFFDE0 0%, #F2D820 100%);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ── Logo ── */
  .logo-area {
    text-align: center;
    padding-top: 48px;
    padding-bottom: 16px;
    flex-shrink: 0;
  }
  .logo-area img {
    height: 78px;
    object-fit: contain;
  }

  /* ── Main two-column layout ── */
  .main-content {
    display: flex;
    flex: 1;
    padding: 10px 36px 44px 54px;
    gap: 28px;
    overflow: hidden;
  }

  /* ── Left column ── */
  .left-col {
    width: 400px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding-top: 24px;
    padding-bottom: 10px;
  }

  .product-name {
    font-weight: 900;
    font-size: 64px;
    color: #1a1a1a;
    text-align: center;
    line-height: 1.08;
    letter-spacing: -1px;
    white-space: pre-wrap;
  }

  .benefits {
    display: flex;
    flex-direction: column;
    gap: 30px;
  }

  .benefit-row {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .benefit-icon {
    width: 58px;
    height: 58px;
    flex-shrink: 0;
  }

  .benefit-text {
    font-size: 27px;
    color: #2a2a2a;
    line-height: 1.25;
    font-weight: 400;
  }

  /* ── Right column ── */
  .right-col {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .product-card {
    background: #FFFFFF;
    border-radius: 30px;
    width: 530px;
    height: 830px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 6px 28px rgba(0,0,0,0.09);
    overflow: hidden;
  }

  /* ── Top en ventas badge ── */
  .top-badge {
    position: absolute;
    top: 24px;
    right: 24px;
    background: #E8893A;
    color: #FFFFFF;
    font-size: 27px;
    font-weight: 700;
    padding: 10px 26px;
    border-radius: 50px;
    display: none;
    white-space: nowrap;
  }

  /* ── Product image area ── */
  .product-image-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 30px 24px 10px;
  }

  .product-image-wrap img {
    max-width: 440px;
    max-height: 580px;
    object-fit: contain;
  }

  /* ── Price ── */
  .price-area {
    width: 100%;
    text-align: center;
    padding: 16px 24px 32px;
  }

  .price-compare {
    font-size: 30px;
    color: #999;
    text-decoration: line-through;
    margin-bottom: 4px;
    display: none;
  }

  .price {
    font-size: 68px;
    font-weight: 900;
    color: #1a1a1a;
    letter-spacing: -2px;
  }
</style>
</head>
<body>
<div id="container">

  <!-- Logo -->
  <div class="logo-area">
    <img id="logo" src="" alt="Fauno" crossorigin="anonymous">
  </div>

  <!-- Main content -->
  <div class="main-content">

    <!-- Left column -->
    <div class="left-col">
      <div class="product-name" id="product-name">Nombre\nProducto</div>

      <div class="benefits" id="benefits">
        <!-- Rendered by JS -->
      </div>
    </div>

    <!-- Right column: product card -->
    <div class="right-col">
      <div class="product-card">
        <div class="top-badge" id="top-badge">Top en ventas</div>

        <div class="product-image-wrap">
          <img id="product-img" src="" alt="" crossorigin="anonymous">
        </div>

        <div class="price-area">
          <div class="price-compare" id="price-compare"></div>
          <div class="price" id="price">$38,900</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ── SVG Icons (line art, matching Canva design) ──────────────────────────────

const ICON_DERM = `<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M28 6C28 6 10 18 10 32C10 41.9 18.1 50 28 50C37.9 50 46 41.9 46 32C46 18 28 6 28 6Z"
        stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M20 32L25.5 37.5L37 26" stroke="#1a1a1a" stroke-width="2.8"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>`;

const ICON_CRUELTY = `<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <ellipse cx="28" cy="38" rx="13" ry="11" stroke="#1a1a1a" stroke-width="2.5"/>
  <ellipse cx="28" cy="24" rx="9" ry="8" stroke="#1a1a1a" stroke-width="2.5"/>
  <path d="M22 18C20 10 15 6 15 6" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M34 18C36 10 41 6 41 6" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="24.5" cy="23" r="1.8" fill="#1a1a1a"/>
  <circle cx="31.5" cy="23" r="1.8" fill="#1a1a1a"/>
  <path d="M26.5 27L28 29L29.5 27" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="41" cy="39" r="3.5" stroke="#1a1a1a" stroke-width="2"/>
</svg>`;

const ICON_NATURAL = `<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M28 50V24" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M28 36C28 36 16 30 13 18C24 18 28 30 28 36Z"
        stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linejoin="round"/>
  <path d="M28 28C28 28 40 22 43 10C32 10 28 22 28 28Z"
        stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linejoin="round"/>
  <path d="M43 34L44 30L45 34L49 35L45 36L44 40L43 36L39 35Z" fill="#1a1a1a"/>
</svg>`;

const DEFAULT_BENEFITS = [
  { icon: ICON_DERM,    text: 'Dermatológicamente\ncomprobado' },
  { icon: ICON_CRUELTY, text: 'Libre de\ncrueldad animal' },
  { icon: ICON_NATURAL, text: 'Extractos\nnaturales' },
];

function formatPrice(n) {
  return '$' + Math.round(n).toLocaleString('es-CO');
}

async function renderProduct(data) {
  // ── Logo
  document.getElementById('logo').src = data.logo_url;

  // ── Product name (title + subtitle en líneas separadas)
  const nameEl = document.getElementById('product-name');
  const fullTitle = data.subtitle ? data.title + '\n' + data.subtitle : data.title;
  nameEl.textContent = fullTitle;

  const len = fullTitle.length;
  if      (len > 50) nameEl.style.fontSize = '42px';
  else if (len > 38) nameEl.style.fontSize = '50px';
  else if (len > 28) nameEl.style.fontSize = '56px';
  else               nameEl.style.fontSize = '64px';

  // ── Benefits: custom del sheet o defaults del diseño Canva
  const benefitsEl = document.getElementById('benefits');
  benefitsEl.innerHTML = '';
  const icons = [ICON_DERM, ICON_CRUELTY, ICON_NATURAL];

  let bList = DEFAULT_BENEFITS;
  if (data.benefits && data.benefits.length >= 1) {
    bList = data.benefits.slice(0, 3).map((text, i) => ({
      icon: icons[i] || ICON_NATURAL,
      text,
    }));
  }

  bList.forEach(b => {
    const row = document.createElement('div');
    row.className = 'benefit-row';
    row.innerHTML = `
      <div class="benefit-icon">${b.icon}</div>
      <div class="benefit-text">${b.text.replace(/\n/g, '<br>')}</div>
    `;
    benefitsEl.appendChild(row);
  });

  // ── Product image
  document.getElementById('product-img').src = data.image_url;

  // ── Price
  const isOnSale = data.compare_at_price && data.compare_at_price > data.price;
  document.getElementById('price').textContent = formatPrice(data.price);

  const compareEl = document.getElementById('price-compare');
  if (isOnSale) {
    compareEl.textContent = formatPrice(data.compare_at_price);
    compareEl.style.display = 'block';
  }

  // ── Top en ventas badge (solo para productos indicados)
  if (data.label === 'top_ventas') {
    document.getElementById('top-badge').style.display = 'block';
  }

  // ── Esperar imágenes
  await Promise.all(
    [...document.images].filter(img => img.src).map(img =>
      img.complete
        ? Promise.resolve()
        : new Promise(r => { img.onload = r; img.onerror = r; })
    )
  );

  await new Promise(r => setTimeout(r, 300));
  window.__RENDER_COMPLETE__ = true;
}

if (window.PRODUCT_DATA) {
  renderProduct(window.PRODUCT_DATA);
}
</script>
</body>
</html>
