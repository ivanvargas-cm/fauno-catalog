<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; width: 500px; height: 500px; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="500" height="500"></canvas>

<script>
// ─── Datos del producto inyectados por Playwright ───────────────────────────
// window.PRODUCT_DATA se setea antes de ejecutar renderProduct()
// Estructura:
// {
//   title: "Alisador Progresivo",
//   subtitle: "400ml",          // volumen / presentación
//   price: 38900,               // número
//   compare_at_price: null,     // número o null
//   image_url: "https://...",   // URL imagen producto (fondo ya removido si es posible)
//   logo_url: "https://...",    // URL logo Fauno
//   benefits: ["Sin Sulfatos", "Sin Parabenos", "Vegano"],
//   label: "top_ventas" | "nuevo" | "exclusivo_online" | null,
//   free_shipping: true | false
// }

const SIZE = 500;

function loadImg(url) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => res(img);
    img.onerror = (e) => rej(new Error('Failed to load: ' + url));
    img.src = url;
  });
}

// Remoción de fondo por flood-fill desde las 4 esquinas
function removeBgFloodFill(img, tol = 40) {
  const c = document.createElement('canvas');
  c.width = img.naturalWidth;
  c.height = img.naturalHeight;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0);
  const id = ctx.getImageData(0, 0, c.width, c.height);
  const d = id.data;
  const W = c.width, H = c.height;
  const visited = new Uint8Array(W * H);

  function colorDist(x, y, br, bg, bb) {
    const i = (y * W + x) * 4;
    return Math.sqrt((d[i] - br) ** 2 + (d[i + 1] - bg) ** 2 + (d[i + 2] - bb) ** 2);
  }
  function getBgColor(x, y) {
    const i = (y * W + x) * 4;
    return [d[i], d[i + 1], d[i + 2]];
  }

  const stack = [];
  [[0, 0], [W - 1, 0], [0, H - 1], [W - 1, H - 1]].forEach(([x, y]) => {
    const [br, bg, bb] = getBgColor(x, y);
    stack.push({ x, y, br, bg, bb });
  });

  while (stack.length) {
    const { x, y, br, bg, bb } = stack.pop();
    if (x < 0 || x >= W || y < 0 || y >= H) continue;
    const idx = y * W + x;
    if (visited[idx]) continue;
    visited[idx] = 1;
    if (colorDist(x, y, br, bg, bb) > tol) continue;
    d[idx * 4 + 3] = 0;
    stack.push(
      { x: x + 1, y, br, bg, bb }, { x: x - 1, y, br, bg, bb },
      { x, y: y + 1, br, bg, bb }, { x, y: y - 1, br, bg, bb }
    );
  }
  ctx.putImageData(id, 0, 0);
  return c;
}

function formatPrice(n) {
  // 38900 → "$ 38.900"
  return '$ ' + Math.round(n).toLocaleString('es-CO');
}

async function renderProduct(data) {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  // ── 1. Fondo amarillo
  ctx.fillStyle = '#FFEC9A';
  ctx.fillRect(0, 0, SIZE, SIZE);

  // ── 2. Panel teal diagonal derecho
  ctx.beginPath();
  ctx.moveTo(SIZE * 0.41, 0);
  ctx.lineTo(SIZE, 0);
  ctx.lineTo(SIZE, SIZE);
  ctx.lineTo(SIZE * 0.21, SIZE);
  ctx.closePath();
  ctx.fillStyle = '#01756C';
  ctx.fill();

  // ── 3. Glow sutil en teal
  const grd = ctx.createRadialGradient(SIZE * 0.79, SIZE * 0.20, 0, SIZE * 0.79, SIZE * 0.20, SIZE * 0.40);
  grd.addColorStop(0, 'rgba(255,255,255,0.07)');
  grd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.moveTo(SIZE * 0.41, 0); ctx.lineTo(SIZE, 0);
  ctx.lineTo(SIZE, SIZE); ctx.lineTo(SIZE * 0.21, SIZE);
  ctx.closePath();
  ctx.fillStyle = grd;
  ctx.fill();

  // ── 4. Cargar y limpiar imágenes (en paralelo)
  const [productImg, logoImg] = await Promise.all([
    loadImg(data.image_url),
    loadImg(data.logo_url)
  ]);
  const productClean = removeBgFloodFill(productImg, 38);
  const logoClean    = removeBgFloodFill(logoImg, 50);

  // ── 5. Producto — centrado en panel teal
  const pW = productClean.width, pH = productClean.height;
  const pScale = Math.min((SIZE * 0.58) / pW, (SIZE * 0.88) / pH);
  const pDW = pW * pScale, pDH = pH * pScale;
  const pX = SIZE * 0.41 + (SIZE * 0.59 - pDW) / 2;
  const pY = (SIZE - pDH) / 2 + SIZE * 0.02;
  ctx.shadowColor = 'rgba(0,0,0,0.22)';
  ctx.shadowBlur = 20;
  ctx.shadowOffsetY = 10;
  ctx.drawImage(productClean, pX, pY, pDW, pDH);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

  // ── 6. Logo (esquina superior izquierda)
  const lW = logoClean.width, lH = logoClean.height;
  const lScale = Math.min((SIZE * 0.30) / lW, (SIZE * 0.10) / lH);
  ctx.drawImage(logoClean, SIZE * 0.040, SIZE * 0.038, lW * lScale, lH * lScale);

  // ── 7. Nombre del producto
  ctx.fillStyle = '#1a2e28';
  ctx.font = `800 ${SIZE * 0.056}px Georgia, serif`;
  const titleWords = data.title.split(' ');
  // Hasta 2 líneas de nombre
  let line1 = '', line2 = '';
  for (let w of titleWords) {
    if (ctx.measureText(line1 + ' ' + w).width < SIZE * 0.35 && !line2) {
      line1 = (line1 ? line1 + ' ' : '') + w;
    } else {
      line2 = (line2 ? line2 + ' ' : '') + w;
    }
  }
  ctx.fillText(line1, SIZE * 0.040, SIZE * 0.275);
  if (line2) ctx.fillText(line2, SIZE * 0.040, SIZE * 0.340);

  // Subtítulo (volumen/presentación)
  if (data.subtitle) {
    ctx.font = `${SIZE * 0.034}px Georgia, serif`;
    ctx.fillText(data.subtitle, SIZE * 0.040, line2 ? SIZE * 0.396 : SIZE * 0.310);
  }

  // ── 8. Benefits (claims)
  const benefits = (data.benefits || []).slice(0, 3);
  ctx.font = `600 ${SIZE * 0.028}px Arial, sans-serif`;
  benefits.forEach((cl, i) => {
    const tw = ctx.measureText(cl).width;
    const pw = tw + SIZE * 0.044, ph = SIZE * 0.052;
    const px = SIZE * 0.040, py = SIZE * 0.632 + i * (ph + SIZE * 0.016);
    ctx.fillStyle = 'rgba(1,117,108,0.13)';
    ctx.beginPath(); ctx.roundRect(px, py, pw, ph, ph / 2); ctx.fill();
    ctx.strokeStyle = 'rgba(1,117,108,0.28)'; ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = '#01756C';
    ctx.fillText(cl, px + SIZE * 0.022, py + ph * 0.68);
  });

  // ── 9. Precio
  const isOnSale = data.compare_at_price && data.compare_at_price > data.price;
  if (isOnSale) {
    // Precio original tachado
    ctx.fillStyle = '#999';
    ctx.font = `${SIZE * 0.032}px Arial`;
    const op = formatPrice(data.compare_at_price);
    const opX = SIZE * 0.040, opY = SIZE * 0.895;
    ctx.fillText(op, opX, opY);
    const opW = ctx.measureText(op).width;
    ctx.strokeStyle = '#999'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(opX, opY - SIZE * 0.006); ctx.lineTo(opX + opW, opY - SIZE * 0.006); ctx.stroke();
    // Precio oferta
    ctx.fillStyle = '#1a2e28';
    ctx.font = `900 ${SIZE * 0.070}px Georgia, serif`;
    ctx.fillText(formatPrice(data.price), SIZE * 0.040, SIZE * 0.970);
  } else {
    ctx.fillStyle = '#1a2e28';
    ctx.font = `900 ${SIZE * 0.070}px Georgia, serif`;
    ctx.fillText(formatPrice(data.price), SIZE * 0.040, SIZE * 0.970);
  }

  // ── 10. Badge de descuento o etiqueta
  if (isOnSale) {
    const discPct = Math.round((1 - data.price / data.compare_at_price) * 100);
    if (discPct >= 5) {
      const bx = SIZE * 0.875, by = SIZE * 0.082, br = SIZE * 0.080;
      ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2);
      ctx.fillStyle = '#E8534A'; ctx.fill();
      ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
      ctx.font = `900 ${SIZE * 0.040}px Arial`;
      ctx.fillText(`-${discPct}%`, bx, by + SIZE * 0.014);
      ctx.textAlign = 'left';
    }
  } else if (data.label) {
    const labels = {
      top_ventas: '⭐ Top Ventas',
      nuevo: '✦ Nuevo',
      exclusivo_online: 'EXCLUSIVO ONLINE'
    };
    const tag = labels[data.label] || data.label;
    ctx.font = `600 ${SIZE * 0.027}px Arial`;
    const tw = ctx.measureText(tag).width + SIZE * 0.040;
    const tx = SIZE * 0.965 - tw, ty = SIZE * 0.040;
    ctx.fillStyle = 'rgba(255,255,255,0.16)';
    ctx.beginPath(); ctx.roundRect(tx, ty, tw, SIZE * 0.052, SIZE * 0.013); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.30)'; ctx.lineWidth = 1.2; ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.fillText(tag, tx + SIZE * 0.018, ty + SIZE * 0.035);
  }

  // ── 11. Envío gratis
  if (data.free_shipping) {
    const es = '🚚 Envío gratis';
    ctx.font = `600 ${SIZE * 0.027}px Arial`;
    const ew = ctx.measureText(es).width + SIZE * 0.040;
    const ex = SIZE * 0.965 - ew, ey = SIZE * 0.926;
    ctx.fillStyle = 'rgba(255,255,255,0.14)';
    ctx.beginPath(); ctx.roundRect(ex, ey, ew, SIZE * 0.052, SIZE * 0.013); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.26)'; ctx.lineWidth = 1.2; ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.fillText(es, ex + SIZE * 0.018, ey + SIZE * 0.035);
  }

  // ── Señal de completado para Playwright
  window.__RENDER_COMPLETE__ = true;
}

// Auto-render si hay datos en window.PRODUCT_DATA
if (window.PRODUCT_DATA) {
  renderProduct(window.PRODUCT_DATA);
}
</script>
</body>
</html>
