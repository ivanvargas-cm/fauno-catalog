name: Fauno Catalog Overlay — Actualización automática

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      only_sale:
        description: 'Solo productos en oferta'
        required: false
        default: 'false'
        type: boolean
      benefits_sheet_id:
        description: 'ID del Google Sheet con pestaña Beneficios (opcional)'
        required: false
        default: ''
        type: string

jobs:
  generate-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Generar imágenes de catálogo
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          ARGS="--shopify --github-push --github-repo ${{ github.repository }} --base-url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/images"
          if [ "${{ inputs.only_sale }}" = "true" ]; then
            ARGS="$ARGS --only-sale"
          fi
          # Beneficios: usar input manual o variable de entorno del repo
          BENEFITS_ID="${{ inputs.benefits_sheet_id }}"
          if [ -z "$BENEFITS_ID" ]; then
            BENEFITS_ID="${{ vars.BENEFITS_SHEET_ID }}"
          fi
          if [ -n "$BENEFITS_ID" ]; then
            ARGS="$ARGS --benefits-sheet-id $BENEFITS_ID"
          fi
          python main.py $ARGS

      - name: Commit y push imágenes
        run: |
          git config user.name  "Fauno Catalog Bot"
          git config user.email "bot@crownmedia.com.co"
          git add docs/images/ || true
          git add output/supplemental_feed.csv || true
          git diff --staged --quiet || git commit -m "chore: actualizar catálogo visual [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push || echo "Sin cambios nuevos"
